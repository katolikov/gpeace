name: Repository Setup

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository description and topics
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: 'Interactive Git merge conflict resolver for the terminal. Beautiful TUI built with Go + Charm.',
              homepage: '',
            });
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: [
                'git',
                'merge-conflicts',
                'cli',
                'tui',
                'terminal',
                'golang',
                'bubbletea',
                'lipgloss',
                'charm',
                'conflict-resolution',
                'developer-tools',
                'git-merge'
              ]
            });
